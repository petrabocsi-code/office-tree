<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recart · Office Attendance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f13; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 48px; border-bottom: 0.5px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .brand { font-size: 13px; color: rgba(255,255,255,0.25); letter-spacing: 0.04em; }
    .clock { font-size: 13px; color: rgba(255,255,255,0.25); font-variant-numeric: tabular-nums; }
    .body { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    .tree-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .overlay-left { position: absolute; left: 2.5rem; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 6px; z-index: 2; }
    .big-num { font-size: 80px; font-weight: 500; line-height: 1; transition: color 1s ease; }
    .big-sub { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .status-badge { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 14px; border-radius: 100px; margin-top: 10px; transition: background 1s, color 1s, border-color 1s; }
    .status-msg { font-size: 14px; color: rgba(255,255,255,0.45); max-width: 180px; line-height: 1.5; margin-top: 8px; }
    .footer { padding: 10px 2rem; border-top: 0.5px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .footer-note { font-size: 11px; color: rgba(255,255,255,0.18); }
  </style>
</head>
<body>
  <div class="top-bar">
    <span class="brand">Recart · Budapest office</span>
    <span class="clock" id="clk">--:--</span>
  </div>
  <div class="body">
    <canvas class="tree-canvas" id="treeCanvas"></canvas>
    <div class="overlay-left">
      <div class="big-num" id="bigNum">--%</div>
      <div class="big-sub">of board minimum met</div>
      <div class="status-badge" id="statusBadge">Loading</div>
      <div class="status-msg" id="statusMsg">Fetching data...</div>
    </div>
  </div>
  <div class="footer">
    <span class="footer-note" id="lastUpdated">Connecting to sheet...</span>
    <span class="footer-note" id="statsNote">Board minimum: headcount × 0.8 × 3 days/week</span>
  </div>

  <script>
    const SHEET_ID = '1Dtp78qsRXpYsmK7vD4PWhPtdAE9DEHUS';
    const DATA_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=1458234412`;
    const CONFIG_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=685099077`;
    const REFRESH_MS = 5 * 60 * 1000;
    const FALLBACK_WORKING_DAYS = 20;

    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, leaves = [], branches = [];
    let targetColor = {r:93,g:202,b:165};
    let currentColor = {r:93,g:202,b:165};
    let pct = 0;

    const COLORS = {
      thriving: {r:29,  g:158, b:117, badge:'rgba(29,158,117,0.15)',  btext:'#1D9E75', border:'rgba(29,158,117,0.4)'},
      ontrack:  {r:93,  g:202, b:165, badge:'rgba(93,202,165,0.15)',  btext:'#5DCAA5', border:'rgba(93,202,165,0.3)'},
      slipping: {r:239, g:159, b:39,  badge:'rgba(239,159,39,0.15)',  btext:'#EF9F27', border:'rgba(239,159,39,0.3)'},
      attention:{r:216, g:90,  b:48,  badge:'rgba(216,90,48,0.15)',   btext:'#D85A30', border:'rgba(216,90,48,0.3)'},
      critical: {r:226, g:75,  b:74,  badge:'rgba(226,75,74,0.15)',   btext:'#E24B4A', border:'rgba(226,75,74,0.3)'},
    };

    function getState(s) {
      if (s >= 90) return 'thriving';
      if (s >= 75) return 'ontrack';
      if (s >= 55) return 'slipping';
      if (s >= 35) return 'attention';
      return 'critical';
    }
    function getBadge(s) {
      if (s >= 90) return 'Thriving';
      if (s >= 75) return 'On Track';
      if (s >= 55) return 'Falling Behind';
      if (s >= 35) return 'Needs Attention';
      return 'Below Target';
    }
    function getMsg(s) {
      if (s >= 90) return 'The office is fully alive this month.';
      if (s >= 75) return 'The month is going well — keep it up.';
      if (s >= 55) return 'Attendance is slipping a little.';
      if (s >= 35) return 'The team needs more office days.';
      return 'Significantly below the board minimum.';
    }

    function lerp(a,b,t){ return a+(b-a)*t; }

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      W = canvas.width  = rect.width;
      H = canvas.height = rect.height;
      buildTree();
    }

    function buildTree() {
      leaves = []; branches = [];
      addBranch(W * 0.58, H * 0.97, -Math.PI/2, H * 0.30, 9, 0);
    }

    function addBranch(x, y, angle, len, thickness, depth) {
      if (len < H * 0.022 || depth > 6) return;
      const ex = x + Math.cos(angle) * len;
      const ey = y + Math.sin(angle) * len;
      branches.push({x1:x, y1:y, x2:ex, y2:ey, t: thickness});
      if (depth >= 4) {
        const numLeaves = depth >= 5 ? 3 : 2;
        for (let i = 0; i < numLeaves; i++) {
          leaves.push({
            baseX: ex + (Math.random()-0.5) * len * 0.3,
            baseY: ey + (Math.random()-0.5) * len * 0.3,
            size: H * (0.032 + Math.random() * 0.02),
            angle: angle + (Math.random()-0.5) * 1.2,
            sway: Math.random() * Math.PI * 2,
            swaySpeed: 0.35 + Math.random() * 0.5,
            swayAmp: 1.2 + Math.random() * 2.0,
            alpha: 0.8 + Math.random() * 0.2,
          });
        }
      }
      const spread = 0.48 + Math.random() * 0.12;
      const lean   = (Math.random() - 0.5) * 0.15;
      const shrink = 0.66 + Math.random() * 0.08;
      addBranch(ex, ey, angle - spread + lean, len * shrink, thickness * 0.65, depth + 1);
      addBranch(ex, ey, angle + spread + lean, len * shrink, thickness * 0.65, depth + 1);
      if (depth < 2) addBranch(ex, ey, angle + (Math.random()-0.5)*0.2, len * (0.58 + Math.random()*0.08), thickness * 0.58, depth + 1);
    }

    function drawLeaf(cx, cy, size, angle, r, g, b, alpha) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.52);
      ctx.bezierCurveTo( size*0.5, -size*0.3,  size*0.5,  size*0.3, 0,  size*0.52);
      ctx.bezierCurveTo(-size*0.5,  size*0.3, -size*0.5, -size*0.3, 0, -size*0.52);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(${Math.max(0,r-25)},${Math.max(0,g-25)},${Math.max(0,b-25)},${alpha*0.35})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
      ctx.restore();
    }

    let t = 0;
    function draw() {
      t += 0.011;
      currentColor.r = lerp(currentColor.r, targetColor.r, 0.03);
      currentColor.g = lerp(currentColor.g, targetColor.g, 0.03);
      currentColor.b = lerp(currentColor.b, targetColor.b, 0.03);
      const r = Math.round(currentColor.r);
      const g = Math.round(currentColor.g);
      const b = Math.round(currentColor.b);
      ctx.clearRect(0, 0, W, H);
      branches.forEach(br => {
        ctx.beginPath();
        ctx.moveTo(br.x1, br.y1);
        ctx.lineTo(br.x2, br.y2);
        ctx.strokeStyle = '#4a3420';
        ctx.lineWidth = Math.max(0.5, br.t);
        ctx.lineCap = 'round';
        ctx.stroke();
      });
      leaves.forEach(lf => {
        const swx = Math.sin(t * lf.swaySpeed + lf.sway) * lf.swayAmp;
        const swy = Math.cos(t * lf.swaySpeed * 0.6 + lf.sway) * lf.swayAmp * 0.35;
        const fa = lf.alpha * Math.min(1, pct * 1.5);
        if (fa < 0.04) return;
        drawLeaf(lf.baseX + swx, lf.baseY + swy, lf.size, lf.angle + swx * 0.035, r, g, b, fa);
      });
      requestAnimationFrame(draw);
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,'').toLowerCase());
      return lines.slice(1).map(line => {
        const vals = line.split(',').map(v => v.trim().replace(/"/g,''));
        const obj = {};
        headers.forEach((h,i) => obj[h] = vals[i]);
        return obj;
      }).filter(r => r[headers[0]]);
    }

    function getMonthKey(date) {
      return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0');
    }

    async function fetchWorkingDays() {
      try {
        const res = await fetch(CONFIG_URL);
        const text = await res.text();
        const rows = parseCSV(text);
        const key = getMonthKey(new Date());
        const row = rows.find(r => r.month && r.month.trim() === key);
        if (row && row.working_days) return parseInt(row.working_days);
      } catch(e) {}
      return FALLBACK_WORKING_DAYS;
    }

    function calcScore(rows, totalWorkingDays) {
      const now = new Date();
      const thisMonth = now.getMonth();
      const thisYear = now.getFullYear();
      const monthRows = rows.filter(r => {
        const d = new Date(r.date);
        return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
      });
      if (monthRows.length === 0) return { score: 0, totalCheckins: 0, fullMonthMin: 0, daysLogged: 0, daysRemaining: totalWorkingDays };
      let totalCheckins = 0, loggedMin = 0, lastHeadcount = 0;
      monthRows.forEach(r => {
        const hc = parseFloat(r.headcount);
        const ci = parseFloat(r.checkins);
        if (!isNaN(hc) && !isNaN(ci)) {
          totalCheckins += ci;
          loggedMin += hc * 0.48;
          lastHeadcount = hc;
        }
      });
      const daysLogged = monthRows.length;
      const daysRemaining = Math.max(0, totalWorkingDays - daysLogged);
      const fullMonthMin = loggedMin + (daysRemaining * lastHeadcount * 0.48);
      const score = Math.round((totalCheckins / fullMonthMin) * 100);
      return { score, totalCheckins: Math.round(totalCheckins), fullMonthMin: Math.round(fullMonthMin), daysLogged, daysRemaining };
    }

    function updateUI(score, totalCheckins, fullMonthMin, daysLogged, daysRemaining) {
      pct = score / 100;
      const state = getState(score);
      const c = COLORS[state];
      targetColor = {r:c.r, g:c.g, b:c.b};
      document.getElementById('bigNum').textContent = score + '%';
      document.getElementById('bigNum').style.color = c.btext;
      const badge = document.getElementById('statusBadge');
      badge.textContent = getBadge(score);
      badge.style.background = c.badge;
      badge.style.color = c.btext;
      badge.style.border = '0.5px solid ' + c.border;
      document.getElementById('statusMsg').textContent = getMsg(score);
      document.getElementById('statsNote').textContent =
        totalCheckins + ' check-ins · min ' + fullMonthMin + ' · ' + daysLogged + ' days logged · ' + daysRemaining + ' remaining';
      const now = new Date();
      document.getElementById('lastUpdated').textContent =
        'Connected to sheet · updated ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }

    async function fetchAndUpdate() {
      try {
        const [dataRes, totalWorkingDays] = await Promise.all([
          fetch(DATA_URL).then(r => r.text()),
          fetchWorkingDays()
        ]);
        const rows = parseCSV(dataRes);
        const { score, totalCheckins, fullMonthMin, daysLogged, daysRemaining } = calcScore(rows, totalWorkingDays);
        updateUI(score, totalCheckins, fullMonthMin, daysLogged, daysRemaining);
      } catch(e) {
        document.getElementById('lastUpdated').textContent = 'Could not reach sheet — retrying...';
      }
    }

    function tick() {
      const n = new Date();
      document.getElementById('clk').textContent =
        String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    }

    window.addEventListener('resize', resize);
    resize(); draw(); tick();
    setInterval(tick, 10000);
    fetchAndUpdate();
    setInterval(fetchAndUpdate, REFRESH_MS);
  </script>
</body>
</html>
